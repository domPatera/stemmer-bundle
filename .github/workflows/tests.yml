name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php }} | Symfony ${{ matrix.symfony }} | ${{ matrix.dependency_version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.3
            symfony: 6.4.*
            dependency_version: lowest

          - php: 8.5
            symfony: 8.0.*
            dependency_version: highest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, iconv, json, xml

      - name: Install dependencies
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require symfony/flex

          composer config extra.symfony.require "${{ matrix.symfony }}"

          if [ "${{ matrix.dependency_version }}" = "lowest" ]; then
             composer update --prefer-dist --no-interaction --prefer-lowest --prefer-stable
          else
             composer update --prefer-dist --no-interaction
          fi

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit tests
